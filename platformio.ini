; LoctekMotion / FlexiSpot desk controller — PlatformIO project
;
;   pio run -e d1_mini -t upload    flash a Wemos D1 mini (ESP8266) over USB
;   pio run -e esp32dev -t upload   flash an ESP32 dev board over USB
;   pio test -e native              run the host-side decoder unit tests
;
; Wi-Fi and MQTT settings are provisioned on-device via a captive portal
; (WiFiManager) on first boot — no credentials are compiled in. Board
; differences (pins, UART backend, WiFi/OTA/TLS API names) are concentrated
; in src/config.h, src/DeskUart.* and src/Platform.* — see those for how a
; third board would be added.

[platformio]
default_envs = d1_mini

[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -Wall
lib_deps =
    knolleary/PubSubClient@^2.8
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.2.0

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -Wall
lib_deps =
    knolleary/PubSubClient@^2.8
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.2.0

; Host-side unit tests for the pure protocol decoder (no hardware required).
[env:native]
platform = native
build_flags =
    -std=c++17
    -Wall
